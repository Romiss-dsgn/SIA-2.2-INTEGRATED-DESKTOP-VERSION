<!DOCTYPE html>
<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Patient Registration - WellServed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="CSS/Global.css" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#065f46",
              "brand-light": "#f0fdf4",
              "background-light": "#f8fafc",
            },
            fontFamily: {
              sans: ["'Plus Jakarta Sans'", "sans-serif"],
              display: ["'Plus Jakarta Sans'", "sans-serif"],
            },
            borderRadius: {
              "3xl": "24px",
              "4xl": "32px",
            },
          },
        },
      };
    </script>
    <style type="text/tailwindcss">
      @layer base {
        body {
          font-feature-settings: "cv02", "cv03", "cv04", "cv11";
        }
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 5px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #e2e8f0;
        border-radius: 10px;
      }
      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
        display: inline-block;
        vertical-align: middle;
      }
      .card-shadow {
        box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05);
      }
    </style>
  </head>
  <body class="bg-[#F3F4F6] dark:bg-slate-900 dark:text-slate-100 text-slate-900 transition-colors duration-200 flex h-screen overflow-hidden" data-notification-handler="page">
    <script src="JS/Sidebar.js"></script>
    <script>loadSidebar("AddPatient.html");</script>

    <!-- NEW HEADER -->
    <header id="topHeader" class="fixed top-0 left-64 right-0 h-20 flex items-center justify-end px-10 bg-white/80 dark:bg-slate-800/80 backdrop-blur-md border-b border-slate-100 dark:border-slate-700 z-40">
      <div class="flex items-center gap-6">
        <div class="flex items-center gap-4 bg-slate-50 dark:bg-slate-700 px-4 py-2 rounded-2xl border border-slate-100 dark:border-slate-600">
          <div class="flex flex-col items-end">
            <span id="clockDisplay" class="text-sm font-bold text-slate-700 dark:text-slate-200">12:00:00 PM</span>
            <span id="headerDateDisplay" class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">—</span>
          </div>
        </div>
        <div class="flex items-center gap-6">
          <div class="relative">
            <button type="button" id="notificationBell" aria-label="Notifications" class="relative flex items-center justify-center w-12 h-12 text-primary hover:opacity-90 transition-opacity rounded-full hover:bg-slate-100 dark:hover:bg-slate-700/50 border-0 cursor-pointer z-50">
              <span class="material-symbols-outlined text-[28px] select-none">notifications</span>
              <span id="notificationBadge" class="absolute top-0.5 right-0.5 w-5 h-5 bg-red-500 border-2 border-white dark:border-slate-800 rounded-full hidden items-center justify-center text-[10px] font-bold text-white"></span>
            </button>
          </div>
          <div id="headerUserAvatar" class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-white font-bold text-sm ring-4 ring-primary/5">—</div>
        </div>
      </div>
    </header>

    <!-- ORIGINAL STRUCTURE PRESERVED EXACTLY -->
    <main class="flex-1 ml-64 p-5 overflow-y-auto" style="margin-top: 80px;">
      <div class="mainContent bg-white rounded-xl shadow-sm border border-border-light p-6">
        <div class="titleCon mb-6">
          <h1 class="txtTitle text-2xl font-bold text-primary">New Patient Registration</h1>
        </div>

        <form id="addPatient" action="">
          <section class="topSec grid grid-cols-1 md:grid-cols-2 gap-8 mb-6">
            <div class="topLeft">
              <div class="section-header flex items-center gap-2 text-primary font-semibold mb-4">
                <i class="fas fa-id-card"></i> Personal Information
              </div>
              <div class="form-group mb-4">
                <label for="patientid" class="block text-sm font-medium text-gray-700 mb-1">Patient ID</label>
                <div class="input-wrapper relative">
                  <input type="text" id="patientid" name="patientid" placeholder="Auto-generated" readonly class="has-icon w-full px-4 py-2.5 rounded-lg border border-gray-200 bg-gray-50" />
                  <i class="fas fa-hashtag absolute right-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                </div>
              </div>
              <div class="form-group mb-4">
                <label for="firstname" class="block text-sm font-medium text-gray-700 mb-1">First Name <span class="required text-red-500">*</span></label>
                <div class="input-wrapper relative">
                  <input type="text" id="firstname" name="firstname" placeholder="Enter first name" required class="has-icon w-full px-4 py-2.5 rounded-lg border border-gray-200" pattern="[A-Za-zÑñ\s\-']+" title="Only letters, spaces, hyphens, and apostrophes allowed" />
                  <i class="fas fa-user absolute right-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                </div>
              </div>
              <!-- ✅ NEW: Middle Name Field -->
              <div class="form-group mb-4">
                <label for="middlename" class="block text-sm font-medium text-gray-700 mb-1">Middle Name <span class="text-gray-400 text-xs">(Optional)</span></label>
                <div class="input-wrapper relative">
                  <input type="text" id="middlename" name="middlename" placeholder="Leave blank if none" class="has-icon w-full px-4 py-2.5 rounded-lg border border-gray-200" pattern="[A-Za-zÑñ\s\-']+" title="Only letters, spaces, hyphens, and apostrophes allowed" />
                  <i class="fas fa-user absolute right-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                </div>
              </div>
              <div class="form-group mb-4">
                <label for="dob" class="block text-sm font-medium text-gray-700 mb-1">Date of Birth <span class="required text-red-500">*</span></label>
                <div class="input-wrapper relative">
                  <input type="date" id="dob" name="dob" max="" required class="has-icon w-full px-4 py-2.5 rounded-lg border border-gray-200" />
                  <i class="fas fa-calendar-alt absolute right-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                </div>
              </div>
            </div>
            <div class="topRight">
              <div class="section-header flex items-center gap-2 text-primary font-semibold mb-4 opacity-0">Spacer</div>
              <div class="form-group mb-4">
                <label for="lastname" class="block text-sm font-medium text-gray-700 mb-1">Last Name <span class="required text-red-500">*</span></label>
                <div class="input-wrapper relative">
                  <input type="text" id="lastname" name="lastname" placeholder="Enter last name" required class="has-icon w-full px-4 py-2.5 rounded-lg border border-gray-200" pattern="[A-Za-zÑñ\s\-']+" title="Only letters, spaces, hyphens, and apostrophes allowed" />
                  <i class="fas fa-user absolute right-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                </div>
              </div>
              <div class="form-group mb-4">
                <label for="gender" class="block text-sm font-medium text-gray-700 mb-1">Gender <span class="required text-red-500">*</span></label>
                <div class="input-wrapper relative">
                  <select id="gender" name="gender" required class="has-icon w-full px-4 py-2.5 rounded-lg border border-gray-200">
                    <option value="">Select Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="other">Other</option>
                    <option value="prefer-not-to-say">Prefer not to say</option>
                  </select>
                  <i class="fas fa-venus-mars absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"></i>
                </div>
              </div>
            </div>
          </section>

          <section class="middleSec mb-6">
            <div class="section-header flex items-center gap-2 text-primary font-semibold mb-4">
              <i class="fas fa-map-marker-alt"></i> Address Information
            </div>
            <div class="form-group mb-4">
              <label for="address" class="block text-sm font-medium text-gray-700 mb-1">Street Address</label>
              <div class="input-wrapper relative">
                <input type="text" id="address" name="address" placeholder="Enter street address" required class="has-icon w-full px-4 py-2.5 rounded-lg border border-gray-200" />
                <i class="fas fa-home absolute right-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
              </div>
            </div>
          </section>

          <section class="bottomSec grid grid-cols-1 md:grid-cols-2 gap-8 mb-6">
            <div class="bottomLeft">
              <div class="form-group mb-4">
                <label for="barangay" class="block text-sm font-medium text-gray-700 mb-1">Barangay</label>
                <div class="input-wrapper relative">
                  <input type="text" id="barangay" name="barangay" placeholder="Enter barangay" required class="has-icon w-full px-4 py-2.5 rounded-lg border border-gray-200" />
                  <i class="fas fa-map-pin absolute right-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                </div>
              </div>
              <div class="form-group mb-4">
                <label for="zipcode" class="block text-sm font-medium text-gray-700 mb-1">Zip Code</label>
                <div class="input-wrapper relative">
                  <input type="text" id="zipcode" name="zipcode" placeholder="Enter zip code (4 digits)" required class="has-icon w-full px-4 py-2.5 rounded-lg border border-gray-200" maxlength="4" pattern="[0-9]{4}" title="Please enter exactly 4 digits" />
                  <i class="fas fa-mail-bulk absolute right-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                </div>
              </div>
              <div class="form-group mb-4">
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <div class="input-wrapper relative">
                  <input type="email" id="email" name="email" placeholder="example@email.com" required class="has-icon w-full px-4 py-2.5 rounded-lg border border-gray-200" />
                  <i class="fas fa-envelope absolute right-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                </div>
              </div>
            </div>
            <div class="bottomRight">
              <div class="form-group mb-4">
                <label for="city" class="block text-sm font-medium text-gray-700 mb-1">City</label>
                <div class="input-wrapper relative">
                  <input type="text" id="city" name="city" placeholder="Enter city" required class="has-icon w-full px-4 py-2.5 rounded-lg border border-gray-200" />
                  <i class="fas fa-city absolute right-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                </div>
              </div>
              <div class="form-group mb-4">
                <label for="phone" class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
                <div class="input-wrapper relative">
                  <input type="tel" id="phone" name="phone" placeholder="09XXXXXXXXX" required class="has-icon w-full px-4 py-2.5 rounded-lg border border-gray-200" maxlength="11" pattern="[0-9]{11}" title="Please enter exactly 11 digits" />
                  <i class="fas fa-phone absolute right-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                </div>
              </div>
              
            </div>
          </section>

          <section class="emerSec mb-6">
            <div class="section-header flex items-center gap-2 text-primary font-semibold mb-4">
              <i class="fas fa-triangle-exclamation"></i> Emergency Contact
            </div>
            <div class="bottomSec grid grid-cols-1 md:grid-cols-2 gap-8">
              <div class="bottomLeft">
                <div class="form-group mb-4">
                  <label for="em_fullname" class="block text-sm font-medium text-gray-700 mb-1">Full Name <span class="required text-red-500">*</span></label>
                  <div class="input-wrapper relative">
                    <input type="text" id="em_fullname" name="em_fullname" placeholder="Enter full name" required class="has-icon w-full px-4 py-2.5 rounded-lg border border-gray-200" pattern="[A-Za-zÑñ\s\-']+" title="Only letters, spaces, hyphens, and apostrophes allowed" />
                    <i class="fas fa-user absolute right-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                  </div>
                </div>
                <div class="form-group mb-4">
                  <label for="em_phone" class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
                  <div class="input-wrapper relative">
                    <input type="tel" id="em_phone" name="em_phone" placeholder="09XXXXXXXXX" class="has-icon w-full px-4 py-2.5 rounded-lg border border-gray-200" maxlength="11" pattern="[0-9]{11}" title="Please enter exactly 11 digits" />
                    <i class="fas fa-phone absolute right-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                  </div>
                </div>
              </div>
              <div class="bottomRight">
                <div class="form-group mb-4">
                  <label for="relationship" class="block text-sm font-medium text-gray-700 mb-1">Relationship <span class="required text-red-500">*</span></label>
                  <div class="input-wrapper relative">
                    <input type="text" id="relationship" name="relationship" placeholder="e.g., Spouse, Parent, Sibling" required class="has-icon w-full px-4 py-2.5 rounded-lg border border-gray-200" />
                    <i class="fas fa-users absolute right-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                  </div>
                </div>
                <div class="form-group mb-4">
                  <label for="em_email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                  <div class="input-wrapper relative">
                    <input type="email" id="em_email" name="em_email" placeholder="example@email.com" class="has-icon w-full px-4 py-2.5 rounded-lg border border-gray-200" />
                    <i class="fas fa-envelope absolute right-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                  </div>
                </div>
              </div>
            </div>
          </section>

          <section class="btnContainer flex gap-4 justify-end">
            <a href="Patients.html" type="button" class="cancelBtn inline-flex items-center gap-2 px-5 py-2.5 rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-100 font-medium">
              <i class="fas fa-times"></i> Cancel
            </a>
            <button type="submit" class="submitBtn inline-flex items-center gap-2 px-5 py-2.5 rounded-lg bg-primary text-white hover:bg-primary/90 font-medium">
              <i class="fas fa-check"></i> Register Patient
            </button>
          </section>
        </form>
      </div>
    </main>

    <!-- Notification dropdown -->
    <div id="notificationDropdown" class="fixed flex flex-col bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl shadow-xl overflow-hidden" style="display: none; top: 88px; right: 40px; width: 400px; max-width: calc(100vw - 320px); max-height: 500px; z-index: 9999;">
      <div class="px-5 py-4 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center">
        <h3 class="text-primary font-semibold text-lg m-0">Notifications</h3>
        <button type="button" id="clearAllNotifications" class="bg-transparent border-none text-slate-500 dark:text-slate-400 cursor-pointer text-sm py-1 px-2 hover:text-slate-700 dark:hover:text-slate-200">Clear All</button>
      </div>
      <div id="notificationList" class="max-h-[440px] overflow-y-auto p-3">
        <p class="text-center text-slate-400 py-5">No notifications</p>
      </div>
    </div>

    <script src="JS/appointment_monitor.js"></script>
    <script src="JS/add_patient.js"></script>
    <script src="JS/appointment_time_notifications.js"></script>
    <script src="JS/nurse_notifications.js"></script>
    <script src="JS/header.js"></script>
    <script>
      (function() {
        function ensureNotificationBell() {
          var bell = document.getElementById("notificationBell");
          var dropdown = document.getElementById("notificationDropdown");
          if (!bell || !dropdown) return;
          if (window._addPatientNotificationBound) return;
          window._addPatientNotificationBound = true;
          bell.addEventListener("click", function(e) {
            e.preventDefault();
            e.stopPropagation();
            var show = dropdown.style.display !== "flex";
            dropdown.style.display = show ? "flex" : "none";
            if (show && typeof loadNotifications === "function") loadNotifications();
          });
          document.addEventListener("click", function(e) {
            if (!bell.contains(e.target) && !dropdown.contains(e.target))
              dropdown.style.display = "none";
          });
        }
        if (document.readyState === "loading")
          document.addEventListener("DOMContentLoaded", ensureNotificationBell);
        else
          ensureNotificationBell();
      })();
    </script>
  </body>
</html>
