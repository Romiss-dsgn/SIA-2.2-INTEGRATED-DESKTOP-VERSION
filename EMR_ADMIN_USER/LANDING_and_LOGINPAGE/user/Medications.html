<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patient Information - Medication</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <link rel="stylesheet" href="CSS/Global.css" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      window.tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#005a32",
              "background-light": "#F9FAFB",
              "card-light": "#FFFFFF",
              "border-light": "#E5E7EB",
            },
            fontFamily: { sans: ["Inter", "sans-serif"] },
          },
        },
      };
    </script>
  </head>
  <body class="flex h-screen bg-background-light text-gray-800 font-sans overflow-hidden">
    <script src="JS/Sidebar.js"></script>
    <script src="JS/recent_patients.js"></script>
    <script>loadSidebar("Patients.html");</script>

    <div class="mainContainer flex-1 ml-64 p-5 overflow-y-auto">
      <header class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-primary">Patient Information</h1>
        <a class="editbtn inline-flex items-center gap-2 px-4 py-2 rounded-lg border border-primary text-primary font-medium hover:bg-primary-light" href="#"><i class="fa-solid fa-pen-to-square"></i> Edit</a>
      </header>
      <main class="bg-card-light rounded-xl shadow-sm border border-border-light p-6">
        <nav-bar class="flex flex-wrap gap-2 mb-6 border-b border-border-light pb-4">
          <a class="personal px-4 py-2 rounded-lg text-gray-600 hover:bg-gray-100 font-medium" href="PatientInfo.html">Personal Info</a>
          <a class="medication px-4 py-2 rounded-lg bg-white border border-primary text-primary font-medium" href="Medications.html">Medication</a>
          <a class="prescription-history px-4 py-2 rounded-lg text-gray-600 hover:bg-gray-100 font-medium" href="PrescriptionHistory.html">Prescription History</a>
          <a class="allergies px-4 py-2 rounded-lg text-gray-600 hover:bg-gray-100 font-medium" href="Allergies.html">Allergies</a>
          <a class="vitalSigns px-4 py-2 rounded-lg text-gray-600 hover:bg-gray-100 font-medium" href="VitalSigns.html">Vital Signs</a>
        </nav-bar>

        <div class="medecineWrap">
          <section class="topSec flex flex-wrap justify-between items-center gap-4 mb-6">
            <h2 class="text-lg font-semibold text-primary">Medication & Prescriptions</h2>
            <div class="flex gap-3">
              <a id="printBtn" href="" class="inline-flex items-center px-4 py-2 rounded-lg border border-gray-300 text-gray-700 font-medium hover:bg-gray-100">Print</a>
              <a id="addMedBtn" href="#" class="inline-flex items-center gap-2 px-4 py-2 rounded-lg bg-primary text-white font-medium hover:bg-primary/90">Add Medication</a>
            </div>
          </section>
          <div id="medicationsContainer"></div>
          <div class="followupSingleWrapper grid grid-cols-1 md:grid-cols-3 gap-4 p-4 bg-gray-50 rounded-xl border border-border-light mt-6">
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-1">Follow Up Date</label>
              <input type="date" id="singleFollowUp" class="followupDatePicker w-full px-4 py-2 rounded-lg border border-gray-200" />
            </div>
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-1">Follow Up Time</label>
              <input type="time" id="singleFollowUpTime" class="followupTimePicker w-full px-4 py-2 rounded-lg border border-gray-200" />
            </div>
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-1">Service</label>
              <select id="singleService" class="serviceDropdown w-full px-4 py-2 rounded-lg border border-gray-200">
                <option value="">Search and select a service...</option>
              </select>
            </div>
          </div>
          <div class="buttonCon flex gap-4 justify-end mt-6" id="buttonCon">
            <a class="savebtn inline-flex items-center gap-2 px-5 py-2.5 rounded-lg bg-primary text-white font-medium hover:bg-primary/90" href="#">Save all changes</a>
            <a class="cancelbtn inline-flex items-center gap-2 px-5 py-2.5 rounded-lg border border-gray-300 text-gray-700 font-medium hover:bg-gray-100" href="#">Cancel</a>
          </div>
        </div>
      </main>
    </div>

    <div id="printModal" class="modal">
      <div class="modal-content" id="modalContent">
        <h2 class="clinic-name text-lg font-bold text-primary mb-2">MediSys Hospital</h2>
        <p class="clinic-address text-sm text-gray-600 mb-1">123 Health Street, Brgy. San Bartolome, Novaliches QC</p>
        <p class="clinic-contact text-sm text-gray-600 mb-4">Tel: (02) 123-4567 | Email: erm@medisys.com.ph</p>
        <h1 class="rxtxt text-2xl font-bold mb-4">Rx</h1>
        <div id="prescriptionList"></div>
        <div class="modal-buttons">
          <button id="confirmPrint">Print</button>
          <button id="cancelPrint">Cancel</button>
        </div>
      </div>
    </div>

    <script src="JS/appointment_monitor.js"></script>
    <script src="JS/prescription.js"></script>
    <script src="JS/header.js"></script>
  </body>
</html>
